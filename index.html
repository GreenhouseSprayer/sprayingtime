<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spray Plan</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

  <style>
    @media print {
      button,
      input[type="file"],
      .no-print,
      .no-print * {
        display: none !important;
      }

      body { margin: 0; padding: 0; font-size: 10px; }
      table { page-break-inside: avoid; }
    }

    body {
      font-size: 12px;
      max-width: 100vw;
      overflow-x: hidden;
    }

    table th, table td { padding: 2px !important; }

    .compact-input {
      padding: 2px !important;
      font-size: 12px !important;
    }

    html { font-size: 14px; }
    @media (min-width: 1024px) {
      html { font-size: 16px; }
    }
  </style>
</head>

<body class="bg-gray-50 p-4">
  <div id="root"></div>

  <script type="text/babel">
    /* --------------------------------------------------------
        CLEAN UPDATED ARRAYS
    -------------------------------------------------------- */
    const MAX_CHEMS = 6;
    
    const DISEASES = [
      "Botrytis (Gray Mold)",
      "Mildews",
      "Rusts",
      "Leaf Spot Diseases",
      "Root Rot Diseases"
    ].sort();

    const PESTS = [
      "Aphids",
      "Mites",
      "Thrips",
      "White Flies",
      "Japanese Beetles",
      "Lepidoptera",
      "Fungus Gnats",
      "Mealy Bugs"
    ].sort();

    const WEED_MANAGEMENT = [
      "Pre-emergent",
      "Post-emergent",
      "Lichens",
      "Liverwort",
      "Algae",
      "Moss",
      "Plant Growth Regulators"
    ].sort();

    const PPE_ITEMS = [
      "Respirator/Mask",
      "Suit",
      "Long Sleeves/Pants",
      "Boots",
      "Face Shield",
      "Gloves",
      "Protective Eyewear"
    ].sort();

    const DEFAULT_APPLICATORS = ["Jacob Imel #154583"];

    function makeLinksForChemical(chemName) {
      const q = encodeURIComponent(chemName);

      return [
        {
          label: "Manufacturer",
          url: `https://www.google.com/search?q=${q}+manufacturer`,
        },
        {
          label: "DoMyOwn",
          url: `https://www.google.com/search?q=site:domyown.com+${q}`,
        },
        {
          label: "Label / SDS",
          url: `https://www.google.com/search?q=${q}+label+SDS+pdf`,
        },
      ];
    }
    
    /* --------------------------------------------------------
        MAIN COMPONENT
    -------------------------------------------------------- */
    function SprayPlanBuilder() {
      const [chemicalOptions, setChemicalOptions] = React.useState([]);
      const [applicators, setApplicators] = React.useState(DEFAULT_APPLICATORS);
      const [selectedChems, setSelectedChems] = React.useState([""]);
      const [applicator, setApplicator] = React.useState("");
      const [method, setMethod] = React.useState("");
      const [equipment, setEquipment] = React.useState("");
      const [error, setError] = React.useState("");
      const [manualPPE, setManualPPE] = React.useState([]);

      const chemicalSheetUrl =
        "https://docs.google.com/spreadsheets/d/e/2PACX-1vTZfyqtPqy898TcyxUzKJzSoOZNj-8qYXs3nRzfbI_tA2qZCaVqiQwz4fgO_jWZ4lF7Rr-a29LxiEw7/pub?output=csv";

      const applicatorSheetUrl =
        "https://docs.google.com/spreadsheets/d/e/2PACX-1vTZfyqtPqy898TcyxUzKJzSoOZNj-8qYXs3nRzfbI_tA2qZCaVqiQwz4fgO_jWZ4lF7Rr-a29LxiEw7/pub?gid=1594882491&single=true&output=csv";

      React.useEffect(() => {
        fetch(chemicalSheetUrl)
          .then(res => res.text())
          .then(data => {
            if (!data || data.indexOf("<html") !== -1) throw new Error("Invalid Sheet Data");
            parseChemicalCSV(data);
          })
          .catch(() => setError("Unable to fetch chemical sheet — upload CSV manually."));

        fetch(applicatorSheetUrl)
          .then(res => res.text())
          .then(data => {
            if (!data || data.indexOf("<html") !== -1) return; // Fail silently, keep defaults
            parseApplicatorCSV(data);
          })
          .catch(() => {});
      }, []);

      /* --------------------------------------------------------
          PARSE CHEMICAL CSV
      -------------------------------------------------------- */
      function parseChemicalCSV(data) {
        try {
          const parsed = Papa.parse(data, {
            header: true,
            skipEmptyLines: true,
            transformHeader: (header) =>
              header ? header.replace(/\uFEFF/g, "").replace(/\u00A0/g, " ").trim().toLowerCase() : ""
          });

          const chemicals = parsed.data
            .map(row => {
              const clean = {};
              for (let k in row) {
                if (k) clean[k.toLowerCase().trim()] = (row[k] || "").trim();
              }

              return {
                chemical: clean["chemical"],
                measurement: clean["measurement"],
                epaReg: clean["epa reg #"],
                wales: clean["wales"],
                warn: clean["warnings/ notes"],
                ai: clean["ai"],
                moA: clean["moa"],
                rei: clean["rei"],
                function: clean["function"],
                stage: clean["stage active"],
                irac: clean["chemical class"],
                signal: clean["signal word"],
                mask: clean["mask needed"]
              };
            })
            .filter(c => c && c.chemical);

          setChemicalOptions(chemicals);
        } catch (err) {
          setError("Error parsing the chemical sheet.");
        }
      }

      /* --------------------------------------------------------
          PARSE APPLICATOR CSV
      -------------------------------------------------------- */
      function parseApplicatorCSV(data) {
        try {
          const parsed = Papa.parse(data, {
            header: true,
            skipEmptyLines: true,
            transformHeader: (header) =>
              header ? header.replace(/\uFEFF/g, "").replace(/\u00A0/g, " ").trim().toLowerCase() : ""
          });

          const list = parsed.data
            .map(row => row["applicators"] ? row["applicators"].trim() : "")
            .filter(item => item !== ""); 
          
          if (list.length > 0) {
            setApplicators([...new Set(list)]);
          }
        } catch (err) {
          console.error("Failed to parse applicators", err);
        }
      }

      const handleCSVUpload = e => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = e => parseChemicalCSV(e.target.result);
        reader.readAsText(file);
      };

      /* --------------------------------------------------------
          APP UI
      -------------------------------------------------------- */
      return (
        <div className="space-y-4 max-w-4xl mx-auto">

          {/* HEADER */}
          <div className="flex items-center gap-3">
            <h1 className="text-2xl font-bold">Spray Plan</h1>
          </div>

          {error && (
            <div className="bg-red-200 text-red-900 p-2 rounded">
              {error}
              <input type="file" accept=".csv" onChange={handleCSVUpload} className="mt-1" />
            </div>
          )}

          <button className="bg-blue-500 text-white px-3 py-1 rounded" onClick={() => window.print()}>
            Print / Save PDF
          </button>

          {/* TOP FORM */}
          <div className="grid grid-cols-2 gap-2">

            {/* LEFT COLUMN */}
            <div className="space-y-2">
              <div>
                <label className="text-xs">Date & Time</label>
                <input
                  type="datetime-local"
                  className="w-full border compact-input rounded"
                />
              </div>
              <div>
                <label className="text-xs">Time Finished</label>
                <input
                  type="time"
                  className="w-full border compact-input rounded"
                />
              </div>

              <div>
                <label className="text-xs">Applicator</label>
                <select
                  className="w-full border compact-input rounded"
                  value={applicator}
                  onChange={e => setApplicator(e.target.value)}
                >
                  <option value="">Select Applicator...</option>
                  {applicators.map((a, i) => (
                    <option key={i} value={a}>{a}</option>
                  ))}
                </select>
              </div>

              <div>
                <label className="text-xs">Method</label>
                <input
                  type="text"
                  className="w-full border compact-input rounded"
                  value={method}
                  onChange={e => setMethod(e.target.value)}
                  placeholder="e.g. Foliar, Drench, Broadcast..."
                />
              </div>
            </div>

            {/* RIGHT COLUMN */}
            <div className="space-y-2">
              <div>
                <label className="text-xs">Area Treated</label>
                <input
                  type="text"
                  className="w-full border compact-input rounded"
                />
              </div>

              <div>
                <label className="text-xs">Equipment</label>
                <input
                  type="text"
                  className="w-full border compact-input rounded"
                  value={equipment}
                  onChange={e => setEquipment(e.target.value)}
                  placeholder="e.g. 100 Gallon Sprayer, Backpack..."
                />
              </div>

              {/* WIND + TEMP */}
              <div className="grid grid-cols-2 gap-2">
                <div>
                  <label className="text-xs">Wind / Direction</label>
                  <input
                    type="text"
                    className="w-full border compact-input rounded"
                    placeholder="10 mph NW"
                  />
                </div>

                <div>
                  <label className="text-xs">Temperature</label>
                  <div className="relative">
                    <input
                      type="text"
                      className="w-full border compact-input rounded pr-8"
                      placeholder="72"
                    />
                    <span className="absolute right-2 top-[6px] text-xs text-gray-600">
                      °F
                    </span>
                  </div>
                </div>
              </div>
            </div>
          </div>

          {/* CHEMICALS */}
          <h2 className="font-semibold mt-2 text-sm">Chemicals Applied</h2>
          <table className
